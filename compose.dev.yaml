services:
  frontend:
    restart: unless-stopped
    build:
      context: ./apps/frontend
      dockerfile: ../../docker/frontend/Dockerfile
      target: dev
    volumes:
      - ./apps/frontend:/app
    ports:
      - 3000:3000
    depends_on:
      - backend
    networks:
      - frontend

  backend:
    restart: unless-stopped
    build:
      context: ./apps/backend
      dockerfile: ../../docker/backend/Dockerfile
      target: dev
      args:
        - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./apps/backend:/app
    ports:
      - 3001:3000
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend
      - frontend

  database:
    restart: unless-stopped
    image: postgres:16-alpine
    volumes:
      - database:/var/lib/postgresql/data
    ports:
      - 5432:5432
    networks:
      - backend
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 3

  adminer:
    image: adminer
    ports:
      - 8080:8080
    depends_on:
      - database
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  database:
