services:
  frontend:
    env_file: .env
    image: frontend:test-latest

  backend:
    env_file: .env
    restart: "no"
    image: backend:test-latest
    volumes:
      - ./apps/backend/node_modules:/app/node_modules
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend

  database:
    image: postgres:16-alpine
    ports:
      - 5432:5432
    volumes:
      - test-database:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-test}
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  backend:
    driver: bridge

volumes:
  test-database:
